**四帝共治内战期间**：罗马皇帝**君士坦丁大帝**在**阿德里安堡战役**中击败了他昔日的共治皇帝**李锡尼**。

---

# 📘 英语教学式讲解

## 1. Civil wars of the Tetrarchy
- 四帝共治时期的内战。
- civil war：内战。
- Tetrarchy：四帝共治（古罗马晚期的政治制度）。

👉 这是一个标题式短语，相当于：
&gt; During the Civil Wars of the Tetrarchy

---

## 2. Roman emperor Constantine the Great
- 罗马皇帝君士坦丁大帝。
- Roman emperor：罗马皇帝。
- Constantine the Great：君士坦丁大帝。

👉 **Constantine the Great** 是历史上最著名的罗马皇帝之一，以推动基督教合法化而闻名。

---

## 3. defeated
- 击败了。
- defeat：战胜、击败。

---

## 4. his former colleague Licinius
- 他昔日的共治者李锡尼。
- former：以前的、昔日的。
- colleague：同僚、同事。

👉 在这里，**colleague** 并不是普通同事，而是指共同统治罗马帝国的皇帝。

---

## 5. at the Battle of Adrianople
- 在阿德里安堡战役中。
- battle：战役。
- Adrianople：阿德里安堡（今土耳其埃迪尔内）。

👉 **at the Battle of...** 是介绍历史战役时的固定表达。

---

# 📌 Language Note

这是一种维基百科（Wikipedia）常见的**历史事件标题句**，结构非常简洁：

&gt; **事件背景 + 主语 + 谓语 + 地点**

即：

**Civil wars of the Tetrarchy**
→ 历史背景

**Roman emperor Constantine the Great**
→ 主语

**defeated**
→ 谓语

**his former colleague Licinius**
→ 宾语

**at the Battle of Adrianople**
→ 地点/事件

这种写法经常出现在历史年表中。

---

# 📚 历史背景（补充）

公元324年，君士坦丁大帝与李锡尼之间爆发最后决战。

- 两人原本同为罗马帝国的共治皇帝。
- **阿德里安堡战役**中，君士坦丁取得关键胜利。
- 随后又在数月后的**赫勒斯滂战役**和**克里索波利斯战役**中继续获胜。
- 李锡尼最终被废黜并处死，君士坦丁成为罗马帝国唯一的统治者，为后来建立君士坦丁堡和推动基督教发展奠定了基础。
