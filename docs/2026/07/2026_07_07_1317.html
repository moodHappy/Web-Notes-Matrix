美悦子点燃了一支香烟，脸上的睫毛膏早已被一天的压力弄花了。她苦笑着说道：“我跟 QuickPick 斗了一场，结果是 QuickPick 赢了。”

---

# 📘 英语教学式讲解

## 1. Miyetsuko lit a cigarette
- 美悦子点燃了一支香烟。
- lit：点燃（light 的过去式/过去分词）。
- cigarette：香烟。

👉 **light a cigarette** 是固定搭配。

例如：
- He lit a cigarette.
- She lit another cigarette.

---

## 2. her face smeared with mascara
- 她的脸被睫毛膏弄花了。
- smeared：涂抹得一团糟、弄花。
- mascara：睫毛膏。

👉 **be smeared with...** 表示：
&gt; 被……弄得满是……

这里暗示她哭过、流汗，或长时间疲惫导致妆容花掉。

---

## 3. from the stress of the day
- 因为一天的压力。
- from：由于。
- stress：压力。

👉 **the stress of the day** 指这一天经历的各种精神压力。

---

## 4. &quot;I fought the QuickPick and the QuickPick won.&quot;
- “我跟 QuickPick 斗了一场，结果 QuickPick 赢了。”
- fought：与……搏斗。
- won：赢了。

👉 这是一个幽默的拟人化表达。

并不是说：

&gt; 她真的和 QuickPick 打架。

而是：

&gt; 她努力对抗 QuickPick（例如系统、抽奖、机器、流程等），最终却失败了。

句式借用了英语里常见的自嘲表达，例如：

- I fought the law and the law won.
  （我和法律作对，最后法律赢了。）

作者将 **the law** 换成 **QuickPick**，形成戏仿效果。

---

# 📌 Language Note

最后一句明显是在引用或戏仿一句著名英语表达：

&gt; **I fought the law and the law won.**

这句话后来因歌曲 **I Fought the Law** 而广为流传，用来表示：

&gt; **“我试图反抗某种无法战胜的力量，最后还是输了。”**

这里改成：

&gt; **I fought the QuickPick and the QuickPick won.**

使 **QuickPick** 被拟人化，仿佛成了一个不可战胜的对手，也让人物的疲惫和无奈显得既幽默又带有黑色喜剧色彩。

---

- be smeared with —— 被……弄花、弄脏
- mascara —— 睫毛膏
- stress —— 压力
- fight —— 与……对抗
- win —— 获胜
