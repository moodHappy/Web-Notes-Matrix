在一场马上长枪比武中，法国国王亨利二世受到致命重伤。当加布里埃尔·德·蒙哥马利的骑枪折断时，飞散的碎片刺穿了他的眼睛。

---

# 📘 英语教学式讲解

## 1. During a jousting match
- 在一场马上长枪比武中。
- during：在……期间。
- jousting match：骑士长枪比武。
  - joust：中世纪骑士骑马持长枪对冲的比赛。
  - match：比赛。

👉 **jousting** 是欧洲中世纪骑士文化中的经典竞技项目。

---

## 2. King Henry II of France
- 法国国王亨利二世。
- King：国王。
- Henry II：亨利二世。
- of France：法国的。

---

## 3. was mortally wounded
- 身受致命重伤。
- was wounded：受伤（被动语态）。
- mortally：致命地。
- mortally wounded：身负致命伤（固定搭配）。

👉 表示伤势最终导致死亡，但不一定当场死亡。

---

## 4. when fragments of Gabriel Montgomery&#039;s lance
- 当加布里埃尔·德·蒙哥马利的骑枪碎片……
- fragments：碎片、残片。
- lance：骑枪、长枪（骑士冲锋用武器）。
- Gabriel Montgomery&#039;s：加布里埃尔·德·蒙哥马利的。

---

## 5. pierced his eye
- 刺穿了他的眼睛。
- pierced：刺穿、贯穿。
- eye：眼睛。

👉 **pierce** 比 **stab** 更强调“穿透”。

---

# 📌 Language Note

这句话采用了典型的**历史事件叙述结构**：

- **时间背景**：During a jousting match
- **事件主体**：King Henry II
- **结果**：was mortally wounded
- **原因**：fragments... pierced his eye

其中：

&gt; **mortally wounded**

是历史、战争、新闻报道中极为常见的表达，意思是：

&gt; **伤势足以致命，后来因此去世。**

---

- fragment —— 碎片
- lance —— 骑枪、长枪
- pierce —— 刺穿
