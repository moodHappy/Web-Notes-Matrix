美国在伊朗发动新一轮袭击后，又对伊朗发起了新一轮打击。

此前，美国总统唐纳德·特朗普在双方周二互相发动攻击之后表示，美国将“今晚再次狠狠打击他们”。

---

# 📘 英语教学式讲解

## 1. The US has launched a new round of strikes on Iran
- 美国已经对伊朗发动了新一轮袭击。

### launch
- 发动、开始实施。

常用于军事、行动：

- launch an attack
  发动攻击

- launch an operation
  开展行动

这里不是“发射”（虽然 launch missile 也可以表示发射导弹）。

---

### a new round of
- 新一轮的……

例如：

- a new round of negotiations
  新一轮谈判

- a new round of fighting
  新一轮战斗

---

### strikes
- 袭击、打击。

军事新闻中：

&gt; air strikes

通常指：

&gt; 空袭。

---

### strike on Iran
- 对伊朗的打击。

注意：

- strike on/against + 目标

表示：

&gt; 对某目标发动打击。

---

# 2. after President Donald Trump signalled...
- 在总统唐纳德·特朗普表示……之后。

### after
这里引导时间背景：

&gt; 在……之后。

---

### signal
- 表示、释放信号。

新闻中非常常见：

例如：

- The government signalled a change in policy.
  政府释放了政策变化的信号。

比：

- say

更强调：

&gt; 暗示、表明态度。

---

# 3. he would &quot;hit them hard again tonight&quot;
- 他会“今晚再次狠狠打击他们”。

### would
这里是过去视角中的将来：

特朗普当时说：

&gt; We will hit them hard.

新闻转述：

&gt; he would hit them hard.

---

### hit them hard
- 狠狠打击他们。

固定表达：

&gt; hit someone hard

可以表示：

① 身体攻击：
- The punch hit him hard.

② 造成严重影响：
- The crisis hit the economy hard.

军事语境：

&gt; 严厉打击。

---

### again tonight
- 今晚再次。

again：
再次。

tonight：
今晚。

---

# 4. following an exchange of attacks on Tuesday
- 在周二双方互相攻击之后。

### following
- 在……之后。

正式新闻表达。

相当于：

&gt; after

例如：

- Following the meeting, changes were announced.
  会议之后宣布了变化。

---

### an exchange of attacks
- 一轮互相攻击。

结构：

&gt; an exchange of + 复数名词

表示双方交换行为。

例如：

- an exchange of fire
  交火

- an exchange of insults
  互相辱骂

---

# 📌 句子结构分析

主句：

&gt; The US has launched a new round of strikes on Iran

美国发动新一轮打击。

↓

时间背景：

&gt; after Trump signalled...

特朗普表态之后。

↓

引用内容：

&gt; he would &quot;hit them hard again tonight&quot;

↓

补充背景：

&gt; following an exchange of attacks on Tuesday

周二双方攻击之后。

---

# 📌 Language Note

这是典型新闻英语结构：

**事件 + 背景 + 引述**

新闻不会直接写：

&gt; Trump said he would attack Iran.

而会写：

&gt; Trump signalled he would hit them hard.

语气更客观，强调：

- 释放信号
- 政策方向
- 后续行动

---

- hit someone hard —— 狠狠打击某人
- again tonight —— 今晚再次
- following —— 在……之后

            const oldText = document.getElementById('raw-analysis').value.trim();
            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });
    </script>
</body>
</html>
