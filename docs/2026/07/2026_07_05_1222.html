**第一次英国内战期间**：在**伯顿桥战役**中，**王党军队**击败了**议会军**，从而为一支随**亨利埃塔·玛丽亚王后**行进的补给车队夺取了跨越**特伦特河**的通道。

# 📘 英语教学式讲解

## 1. First English Civil War
- 第一次英国内战。
- English Civil War：英国内战（17世纪英格兰王党与议会派冲突）。

👉 作为历史标题结构：
&gt; 时间 + 事件名称

---

## 2. Royalist forces defeated the Parliamentarians
- 王党军队击败了议会军。
- Royalist forces：支持国王的军队（王党军）。
- Parliamentarians：议会派军队。

👉 “defeated” 是核心动作：
&gt; 击败 / 战胜

---

## 3. at the Battle of Burton Bridge
- 在伯顿桥战役中。
- Battle of + 地点：标准历史表达。

---

## 4. securing a crossing of the River Trent
- 从而确保获得跨越特伦特河的通道。
- securing：确保、获得。
- crossing：通道、渡口。
- River Trent：特伦特河（英国重要河流）。

👉 这里的 **securing** 表示“战役结果带来的战略收益”。

---

## 5. for a convoy of supplies
- 为一支补给车队。
- convoy：护送车队。
- supplies：补给物资。

👉 **convoy of supplies** = 军事运输队

---

## 6. travelling with Queen Henrietta Maria
- 随亨利埃塔·玛丽亚王后同行的。
- travelling with：与……同行。

👉 历史背景人物：
Henrietta Maria of France

她是英王Charles I of England的王后，在英国内战期间为王党筹集资源并在欧洲活动。

---

# 📌 Language Note

这一句是典型的**军事历史叙述结构**：

### 结构拆解：

- 时间/背景：First English Civil War
- 主体事件：Royalist forces defeated Parliamentarians
- 地点：Battle of Burton Bridge
- 战略结果：securing a crossing
- 附加信息：convoy with the Queen

---

## 核心逻辑：

&gt; 战役胜利 → 控制渡口 → 保障补给运输 → 支援王后行动

这是典型的“军事行动 + 后勤意义”的历史句式。

---

- English Civil War —— 英国内战
- Royalist forces —— 王党军
- Parliamentarians —— 议会军
- defeat —— 击败

- secure a crossing —— 控制渡口 / 获得通行权
- River —— 河流
- convoy of supplies —— 补给车队
- travel with —— 随行
