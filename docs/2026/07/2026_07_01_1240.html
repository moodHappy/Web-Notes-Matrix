“他这次甚至都不屑于掩饰，”她哽咽着说，“他竟然还一本正经地争辩，说东京的每个男人都跟 Mizuki Nemuru 有过关系，就好像那是什么必须完成的成人仪式一样。”

---

# 📘 英语教学式讲解

## 1. &quot;He didn&#039;t even bother to hide it this time&quot;
- “他这次甚至懒得掩饰。”
- didn&#039;t even bother to：甚至不愿意去做……
- hide it：隐藏这件事 / 掩饰。

👉 强烈表达“毫无遮掩”的态度。

---

## 2. &quot;she choked out&quot;
- 她哽咽着说。
- choke out：艰难地说出（因为情绪激动、哭泣或愤怒）。
- 常见于：
  - anger（愤怒）
  - grief（悲伤）
  - shock（震惊）

---

## 3. &quot;He actually argued that...&quot;
- 他竟然还辩称……
- actually：强调“出乎意料 / 难以置信”。
- argue that：主张、辩称、声称。

---

## 4. &quot;every man in Tokyo has been with Mizuki Nemuru&quot;
- 东京的每个男人都跟 Mizuki Nemuru 有过关系。
- every man in...：泛化夸张表达（hyperbole）。
- has been with：和……有过关系（语境依赖）。

👉 注意：这是**夸张 + 八卦式荒诞陈述**，不是事实陈述。

---

## 5. &quot;as if it were some mandatory rite of passage&quot;
- 就好像那是什么必须经历的成人仪式一样。
- as if：好像、仿佛（虚拟语气）。
- mandatory：强制的、必须的。
- rite of passage：成人礼 / 成长仪式（文化人类学概念）。

👉 含义：把荒唐行为“制度化/仪式化”的讽刺。

---

# 📌 Language Note

这句话的核心幽默结构是：

- 极端八卦内容（夸张性断言）
- + 仪式化包装（rite of passage）
- = 制造“荒诞社会规则感”

整体语气属于：
&gt; 网络讽刺 + 荒谬社会想象 + 情绪崩溃式叙述

---

# 📌 Key Expressions

- not even bother to do sth —— 连……都懒得做
- choke out —— 哽咽着说出
- argue that —— 声称 / 辩称
- every man in... —— ……中的每一个男人（夸张）
- be with sb —— 与某人有关系
- as if it were —— 好像那是……
- mandatory rite of passage —— 强制性的成人仪式
- hyperbole —— 夸张修辞
