---

# 📘 英语教学式讲解

## 1. Her confidence soared after the shows.
- 演出结束后，她的自信心大幅提升。

### confidence
- 自信；信心。

例如：

- build confidence
  建立信心

- lose confidence
  失去信心

---

### soar
- 猛增；急剧上升。

本义：

&gt; 飞翔、高飞。

引申：

&gt; 数值、情绪、信心快速提升。

例如：

- Prices soared.
  价格飙升。

- Her popularity soared.
  她的人气暴涨。

这里：

&gt; confidence soared

= 自信心爆棚。

---

### after the shows
- 演出之后。

---

# 2. In a livestream,
- 在一次直播中。

### livestream
- 直播。

也可写：

- live stream

例如：

- watch a livestream
  看直播。

---

# 3. she expressed disbelief at her own singing skills.
- 她对自己的歌唱能力感到难以置信。

### express disbelief
固定表达：

&gt; 表达不敢相信。

例如：

- He expressed disbelief at the news.
  他表示无法相信这个消息。

---

### disbelief
- 不相信；怀疑。

由：

- dis（否定）
- belief（相信）

组成。

---

### her own singing skills
- 她自己的唱歌能力。

### own
强调：

&gt; 她自己的。

例如：

- my own idea
  我自己的想法。

---

# 4. &quot;By the end, I was not even out of breath,&quot;
- “到最后，我甚至都没有喘气。”

### by the end
- 到最后。

例如：

- By the end of the movie, everyone cried.
  到电影结束时，大家都哭了。

---

### not even
- 甚至没有……

加强否定。

例如：

- I didn&#039;t even notice.
  我甚至没有注意到。

---

### out of breath
固定表达：

&gt; 喘不过气；气喘吁吁。

例如：

- She was out of breath after running.
  她跑完后气喘吁吁。

---

# 5. she said, adding that...
- 她说道，并补充说……

### adding that
现在分词结构：

表示：

&gt; 说完后进一步补充。

---

# 6. she could have been a &quot;pop queen&quot;.
- 她本可以成为一位“流行女王”。

### could have been
虚拟语气：

表示：

&gt; 本来可以成为，但现实没有成为。

例如：

- He could have been a great athlete.
  他本可以成为伟大的运动员。

---

### pop queen
- 流行女王。

类似：

- queen of pop
  流行音乐女王。

带有夸张、自我调侃或自信意味。

---

# 📌 句子结构分析

第一句：

主语：

&gt; Her confidence

↓

动作：

&gt; soared

↓

时间：

&gt; after the shows

---

第二句：

背景：

&gt; In a livestream

↓

主句：

&gt; she expressed disbelief

↓

对象：

&gt; at her own singing skills

↓

引用：

&gt; By the end...

↓

补充：

&gt; adding that...

↓

内容：

&gt; she could have been a pop queen

---

这一段体现人物心理变化：

之前：

&gt; dream of being a singer

梦想成为歌手。

↓

演出成功：

&gt; tickets sold out

↓

↓

        viewOrig.addEventListener('dblclick', triggerEditOrig);
        viewOrig.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditOrig(); });
        editOrig.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-original').value.trim();
            this.style.display = 'none';
            viewOrig.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        const viewAnal = document.getElementById('view-analysis');
