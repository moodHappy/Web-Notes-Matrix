# 📘 英语教学式讲解

## 1. In a 927-page disclosure
- 在一份长达927页的披露文件中。
- disclosure：披露文件（通常指财务或法律信息公开）。
- 927-page：复合形容词，表示“927页长的”。

👉 常见于：
- 政治财产申报
- 公司年报
- 法律文件

---

## 2. he reported $635m in royalties
- 他申报了6.35亿美元的版税收入。
- reported：申报、报告（正式财务语境）。
- royalties：版税、使用费（如知识产权收益）。
- $635m：6.35亿美元。

👉 royalties通常来自：
- 音乐
- 影视
- 品牌授权
- IP或数字资产

---

## 3. from a Trump meme coin
- 来自一款“特朗普迷因币”。
- meme coin：迷因币（基于网络文化/梗的加密货币）。
- Trump：此处指政治人物品牌化代币。

👉 meme coin通常：
- 波动极大
- 投机性强
- 缺乏基本面支撑

---

## 4. that has plunged in value
- 其价值已暴跌。
- has plunged：已经暴跌（现在完成时）。
- plunge：急剧下跌。

---

## 5. since he launched it
- 自他推出该币以来。
- since：自从……
- launched：发行、推出（常用于产品或项目）。
- it：指代 meme coin。

---

## 6. three days before taking office
- 在他就任前三天。
- take office：就职、上任（政治术语）。
- three days before：前三天。

---
