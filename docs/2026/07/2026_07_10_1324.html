        <textarea id="raw-analysis" style="display:none;"># 📌 完整翻译

“我还以为，企业社畜也就只有胆子偷偷翻翻杂志呢。”

（也可译为：**“我还以为你们这些社畜，顶多只敢偷看几本杂志。”**）

---

# 📘 英语教学式讲解

## 1. I thought...
- 我还以为……

这里 **thought** 不是单纯表示过去的想法，而是：

&gt; 我原本以为……

常带有：

- 出乎意料
- 带一点讽刺

例如：

- I thought you were smarter than that.
  我还以为你比这聪明呢。

---

## 2. corporate slaves
- 企业社畜。

### corporate
- 公司里的；企业的。

例如：

- corporate culture
  企业文化

- corporate office
  公司总部

---

### slave
字面意思：

- 奴隶。

但 **corporate slave** 是英语里的俚语。

意思：

&gt; 被公司压榨、长期加班、没有自由的上班族。

中文最自然就是：

&gt; 社畜。

---

## 3. only had the courage to...
- 也就只有胆子……

### have the courage to do
固定表达：

&gt; 有勇气做……

例如：

- He had the courage to speak up.
  他有勇气站出来发言。

这里带有明显的讽刺：

&gt; 你们居然只有这点胆量？

---

## 4. peek at magazines
- 偷偷看杂志。

### peek
- 偷看、瞟一眼。

比：

- look

更强调：

&gt; 偷偷地、鬼鬼祟祟地看。

例如：

- peek through the window
  从窗户偷看。

---

### magazine
- 杂志。

这里结合上下文，多半暗示：

- 成人杂志
- 写真杂志

因此说：

&gt; peek at magazines

有一种调侃意味。

---

# 📌 句子结构分析

主干：

&gt; I thought...

我原本以为……

↓

对象：

&gt; corporate slaves

社畜。

↓

限定：

&gt; only had the courage

只有胆子……

↓

动作：

&gt; to peek at magazines

偷偷看杂志。

---

# 📌 Language Note

这句话属于**嘲讽式对白**。

说话人的逻辑是：

&gt; 我本来以为你们这些天天上班、循规蹈矩的人，

↓

&gt; 最大的“出格行为”，

↓

&gt; 也不过是偷偷看看杂志。

因此：

**corporate slave** 并不是正式称呼，而是一种带有戏谑、讽刺意味的俚语。

另外：

**peek** 比 **look** 更生动，强调“偷偷看”，使整句话更有调侃感。

- only have the courage to —— 也就只有胆子……
- peek at —— 偷看；瞟一眼
