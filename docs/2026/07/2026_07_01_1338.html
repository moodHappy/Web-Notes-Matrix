# 📘 英语教学式讲解

## 1. This is very disturbing
- 这非常令人不安。
- disturbing：令人不安的、引起焦虑的。
- very disturbing：强调程度很高。

---

## 2. Earthquakes all over the world one after another
- 全球各地地震接连发生。
- all over the world：遍及全世界。
- one after another：一个接一个。

👉 强调“连续发生”的感受，而非精确地质事实。

---

## 3. And volcanos becoming active
- 火山也变得活跃。
- volcanos：火山（更标准拼写：volcanoes）。
- becoming active：进入活跃状态（喷发或活动增强）。

---

## 4. Plus add wars
- 再加上战争。
- plus：再加上（口语）。
- add wars：增加战争（非正式表达）。

---

## 5. I guess Jesus Christ second coming is near at hand
- 我想耶稣基督的第二次降临快要到了。
- I guess：我猜 / 我想（非确定判断）。
- second coming：再临（宗教概念）。
- near at hand：即将来临 / 很接近。

👉 “near at hand”是比较书面/宗教化表达。

---

## 6. May the good Lord be merciful and gracious to us
- 愿主怜悯并恩待我们。
- May...：愿……（祈愿句结构）。
- the good Lord：主 / 上帝（宗教称呼）。
- merciful：仁慈的。
- gracious：恩典的、慈悲的。

---

- 将自然现象（地震、火山）

- 情绪驱动表达
- 宗教祈愿句

- be merciful —— 仁慈怜悯
- be gracious —— 施恩、慈爱
