# 📘 英语教学式讲解

## 1. In her intense nervousness
- 在她极度紧张之中。
- intense：强烈的、剧烈的。
- nervousness：紧张状态。

👉 **in one&#039;s nervousness** = 在紧张状态下（常见心理描写结构）。

---

## 2. her jaw tensed
- 她的下颌紧绷起来。
- jaw：下颌。
- tensed：紧绷、变得僵硬。

👉 描述身体对紧张的自然反应。

---

## 3. As she moved
- 当她动作时。
- as：当……的时候（同时发生）。

---

## 4. her teeth accidentally grazed
- 她的牙齿不小心擦过。
- accidentally：意外地。
- grazed：轻擦、掠过。

👉 **graze** 强调“轻微接触”。

---

## 5. the most sensitive part of him
- 他最敏感的部位。
- sensitive：敏感的。
- part of him：他的某个部位。

👉 这里属于刻意模糊化表达（euphemism），避免直接具体说明。

---

## 6. Shiraishi let out a sharp, pained hiss
- 白石发出一声尖锐、痛苦的嘶声。
- let out：发出（声音）。
- sharp：尖锐的。
- pained：痛苦的。
- hiss：嘶声（类似吸气或低声痛呼）。

---

## 7. and recoiled instantly
- 并立刻向后退去。
- recoil：本能地后退、退缩（常用于受到刺激或疼痛）。
- instantly：立刻。

---

## 8. his hands gripping her shoulders a bit too hard
- 他的双手抓住她的肩膀，力度有些过大。
- gripping：紧紧抓住。
- a bit too hard：稍微用力过度。

                await saveToGitHub();
            }
        });
