一名年轻男子——一位曾在广场上遭到殴打的前社会活动人士——正坐在会客室里。他脸上带着淤青，眼中燃烧着怒火。

他环顾四周，望着柔软豪华的扶手椅、进口苏格兰威士忌，以及为客人端咖啡的美丽女子，脸上露出轻蔑的冷笑。

“这个地方从头到尾都是骗人的。”他啐了一口，把手中的咖啡杯重重摔在桌上。“你们根本不是什么‘顾问’。你们不过是一群寄生虫。你们专门利用那些已经失去一切的人，一边兜售虚假的梦想，一边过着国王般的生活。”

---

# 📘 英语教学式讲解

## 1. A young man—a former activist who had been beaten at the square—
- 一名年轻男子——一位曾在广场上遭到殴打的前社会活动人士——

### former
- 前任的；曾经的。

例如：

- former president
  前总统

- former employee
  前员工

---

### activist
- 社会活动人士；维权人士。

泛指积极参与社会、政治或公共议题的人。

---

### had been beaten
- 曾被殴打。

过去完成时的被动语态：

&gt; had been + 过去分词

表示：

&gt; 在故事当前时间之前已经发生。

---

### at the square
- 在广场上。

---

## 2. was sitting in the lounge
- 正坐在休息室（会客室）里。

### lounge
- 贵宾休息室；会客室。

例如：

- airport lounge
  机场贵宾室

---

## 3. his face bruised and his eyes full of fire
- 他脸上满是淤青，眼中燃烧着怒火。

这是独立主格结构：

&gt; his face bruised
&gt;
&gt; his eyes full of fire

补充说明人物状态。

---

### bruised
- 布满瘀伤的。

来自：

- bruise（瘀伤）。

---

### full of fire
字面：

&gt; 充满火焰。

实际：

&gt; 充满愤怒、斗志或激情。

---

## 4. He looked around at the plush armchairs
- 他环顾四周，看着那些豪华的扶手椅。

### look around
- 环顾四周。

---

### plush
- 豪华舒适的；毛绒的。

例如：

- plush hotel
  豪华酒店

---

### armchair
- 扶手椅。

---

## 5. the imported scotch
- 进口苏格兰威士忌。

### Scotch
大写时通常指：

&gt; 苏格兰威士忌（Scotch whisky）。

---

### imported
- 进口的。

---

## 6. and the beautiful women serving coffee
- 以及端着咖啡的美丽女子。

### serve coffee
- 端咖啡；提供咖啡。

---

## 7. and he sneered.
- 他轻蔑地冷笑了一声。

### sneer
- 冷笑；轻蔑地嘲讽。

例如：

- He sneered at them.
  他轻蔑地嘲笑他们。

---

## 8. This whole place is bogus.
- 这个地方完全是骗人的。

### bogus
- 虚假的；骗人的；假的。

例如：

- bogus documents
  假文件

- bogus promises
  虚假的承诺

---

## 9. he spat
- 他啐了一口说道。

### spat
是 **spit** 的过去式。

这里不是单纯“说”，而是：

&gt; 带着愤怒、轻蔑地吐出这句话。

---

## 10. throwing his cup onto the table
- 把杯子狠狠扔到桌上。

现在分词表示伴随动作。

---

## 11. You&#039;re not &quot;consultants.&quot;
- 你们根本不是什么“顾问”。

consultants 加引号：

表示：

&gt; 所谓的“顾问”。

暗示说话人不认可这个身份。

---

## 12. You&#039;re just parasites.
- 你们不过是一群寄生虫。

### parasite
- 寄生虫。

比喻：

&gt; 靠别人生存、剥削他人的人。

这是非常强烈的辱骂。

---

## 13. You&#039;re preying on people who&#039;ve lost everything
- 你们专门利用那些已经失去一切的人。

### prey on
固定短语：

&gt; 利用……的弱点；趁人之危；掠夺。

例如：

- Criminals prey on the elderly.
  犯罪分子专门欺骗老人。

---

### people who&#039;ve lost everything
- 已经失去一切的人。

这里：

&gt; who have

缩写成：

&gt; who&#039;ve。

---

## 14. peddling some fake dream
- 兜售某种虚假的梦想。

### peddle
- 沿街兜售；到处推销。

引申义：

&gt; 推销某种理念、骗局。

例如：

- peddle lies
  散布谎言

---

### fake dream
- 虚假的梦想。

---

## 15. while you live like kings.
- 而你们却过着国王般的生活。

### live like kings
固定比喻：

&gt; 过着极其奢华的生活。

例如：

- They live like kings while others suffer.
  别人受苦时，他们却过着帝王般的生活。

---

# 📌 句子结构分析

描写：

&gt; A young man...

↓

外貌：

&gt; face bruised

↓

神态：

&gt; eyes full of fire

↓

观察：

&gt; looked around...

↓

评价：

&gt; bogus

↓

三连指控：

- You&#039;re not consultants.
- You&#039;re just parasites.
- You&#039;re preying on...

↓

总结：

&gt; live like kings.

---

# 📌 Language Note

这段对白情绪层层升级：

**第一层：否定身份**

&gt; You&#039;re not consultants.

↓

**第二层：辱骂身份**

&gt; You&#039;re parasites.

↓

**第三层：控诉行为**

&gt; You&#039;re preying on people...

↓

**第四层：揭露利益**

&gt; while you live like kings.

这种递进式结构使情绪越来越强烈，也让人物的愤怒表达得更加有力。

- be beaten —— 被殴打
- lounge —— 会客室；休息室

- bogus —— 虚假的；骗人的
- spit (spat) —— 啐道；愤怒地说
- parasite —— 寄生虫（比喻剥削者）
- prey on —— 利用；趁人之危
- peddle —— 兜售；推销

                if (typeof marked !== 'undefined') {
                    document.getElementById('view-analysis').innerHTML = marked.parse(analContent);
                }
            } catch(e) {
                console.error("Markdown failed", e);
            }
        };

        const triggerEditOrig = function() {
            const viewBlock = document.getElementById('view-original');
            const editBlock = document.getElementById('edit-original');
            viewBlock.style.display = 'none';
            editBlock.style.display = 'block';
            editBlock.value = document.getElementById('raw-original').value;
            editBlock.focus();
        };

        const triggerEditAnal = function() {
            const viewBlock = document.getElementById('view-analysis');
            const editBlock = document.getElementById('edit-analysis');
            viewBlock.style.display = 'none';
            editBlock.style.display = 'block';
            editBlock.value = document.getElementById('raw-analysis').value;
            editBlock.focus();
        };

        window.onload = renderAll;

        const saveToGitHub = async function() {
            const token = localStorage.getItem('GH_TOKEN');
            if(!token) return alert("⚠️ 缺少 GH_TOKEN。请确保在主枢纽页面配置过！");

            const statusMsg = document.getElementById('sync-status');
            statusMsg.style.display = 'block';
            statusMsg.style.color = ACCENT;
            statusMsg.innerText = '📡 静默同步中...';

            const orig = document.getElementById('raw-original').value;
            const anal = document.getElementById('raw-analysis').value;
            const pTitle = document.getElementById('raw-page-title').value;
            const pUrl = document.getElementById('raw-page-url').value;

            const pureHtml = buildHTML(
                document.title,
                escapeHTML(orig),
                escapeHTML(anal),
                escapeHTML(pTitle),
                escapeHTML(pUrl),
                GH_OWNER,
                GH_REPO,
                ACCENT,
                escapeHTML.toString(),
                buildHTML.toString()
            );

            const path = window.location.pathname;
            const fileRelPath = path.substring(path.indexOf('docs/'));
            try {
                const utf8Array = Array.from(new TextEncoder().encode(pureHtml));
                const binaryString = utf8Array.map(b => String.fromCharCode(b)).join('');
                const base64Html = btoa(binaryString);

                const getRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const fileData = await getRes.json();

                const putRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Auto-save update (Text/Analysis)`,
                        content: base64Html,
                        sha: fileData.sha
                    })
                });

                if(putRes.ok) {
                    statusMsg.style.color = '#27ae60';
                    statusMsg.innerText = '✅ 云端已同步';
                    setTimeout(() => statusMsg.style.display = 'none', 3000);
                } else {
                    statusMsg.style.color = '#e74c3c';
                    statusMsg.innerText = '❌ 同步失败';
                }
            } catch(e) {
                statusMsg.style.color = '#e74c3c';
                statusMsg.innerText = '❌ 网络断开';
            }
        };

        const viewOrig = document.getElementById('view-original');
        const editOrig = document.getElementById('edit-original');
        viewOrig.addEventListener('dblclick', triggerEditOrig);
        viewOrig.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditOrig(); });
        editOrig.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-original').value.trim();
            this.style.display = 'none';
            viewOrig.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-original').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });

        const viewAnal = document.getElementById('view-analysis');
        const editAnal = document.getElementById('edit-analysis');
        viewAnal.addEventListener('dblclick', triggerEditAnal);
        viewAnal.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEditAnal(); });
        editAnal.addEventListener('blur', async function() {
            const newText = this.value.trim();
            const oldText = document.getElementById('raw-analysis').value.trim();
            this.style.display = 'none';
            viewAnal.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText;
                renderAll();
                await saveToGitHub();
            }
        });
    </script>
</body>
</html>
