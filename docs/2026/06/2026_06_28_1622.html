<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Humanitarian aid agencies...</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #fcfcfc; --surface: #ffffff; --text: #2c3e50; --border: #ecf0f1; --accent: #2980b9; --highlight: #fef9e7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; padding-bottom: 50px;}
        .nav-back { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        .nav-back a { text-decoration: none; color: white; background: var(--text); padding: 8px 18px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .sync-status { font-size: 0.85rem; color: #27ae60; font-weight: bold; display: none; }

        .source-link { font-size: 0.85rem; color: var(--accent); text-decoration: none; display: inline-block; margin-top: 12px; background: #f0f7ff; padding: 6px 14px; border-radius: 20px; font-weight: bold; border: 1px solid #e1efff;}

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .card-header { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: #95a5a6; border-bottom: 1px dashed var(--border); padding-bottom: 8px; margin-bottom: 12px; font-weight: bold;}

        .markdown-body { font-size: 1.05rem; line-height: 1.6; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: var(--accent); margin-top: 16px; margin-bottom: 8px; font-weight: 700; border-bottom: 1px dashed #eee; padding-bottom: 4px; }
        .markdown-body h3 { font-size: 1.15rem; }
        .markdown-body p { margin-top: 0; margin-bottom: 8px; }
        .markdown-body ul, .markdown-body ol { margin-top: 0; margin-bottom: 8px; padding-left: 20px; }
        .markdown-body li { margin-bottom: 4px; }
        .markdown-body li p { margin: 0; }
        .markdown-body p:empty { display: none; }
        .markdown-body br + br { display: none; }
        .markdown-body blockquote { margin: 0 0 10px 0; padding: 10px 15px; background: var(--highlight); border-left: 5px solid #f1c40f; color: #5c4d22; font-family: Georgia, serif; font-size: 1.1rem; border-radius: 0 8px 8px 0; }
        .markdown-body blockquote p { margin-bottom: 0; }

        .edit-textarea { width: 100%; min-height: 250px; padding: 15px; font-family: monospace; font-size: 1.05rem; border: 2px solid var(--accent); border-radius: 10px; box-sizing: border-box; resize: vertical; display: none; outline: none;}
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-back">
            <a href="../../index.html">🔙 返回全局网络矩阵</a>
            <span class="sync-status" id="sync-status">📡 同步中...</span>
        </div>

        <textarea id="raw-original" style="display:none;">Humanitarian aid agencies say the first 48 to 72 hours are crucial for rescuing people alive, although this window can be longer if those trapped have access to food and water.</textarea>
        <textarea id="raw-analysis" style="display:none;">计算机视觉</textarea>

        <div class="card">
            <div class="card-header">🌐 来源档案 (Source)</div>
            <div style="font-weight:bold; color:#2c3e50;">La Guaira: Families calling out to loved ones trapped in rubble by Venezuela quakes</div>
            <a href="https://www.bbc.com/news/articles/cp8l451420zo" target="_blank" class="source-link">🔗 原文链接</a>
        </div>

        <div class="card">
            <div class="card-header">📖 原始摘录 (Snippet)</div>
            <div id="view-original" class="markdown-body" style="white-space: pre-wrap; font-family: Georgia, serif; font-size: 1.15rem; line-height: 1.8; color: #34495e;"></div>
        </div>

        <div class="card" id="block-analysis">
            <div class="card-header">🔬 深度笔记 (Analysis)</div>
            <div id="view-analysis" class="markdown-body"></div>
            <textarea id="edit-analysis" class="edit-textarea"></textarea>
        </div>
    </div>

    <script>
        const GH_OWNER = "moodHappy"; const GH_REPO = "Web-Notes-Matrix";
        function renderAll() {
            document.getElementById('view-original').textContent = document.getElementById('raw-original').value;
            const analContent = document.getElementById('raw-analysis').value;
            try { if (typeof marked !== 'undefined') document.getElementById('view-analysis').innerHTML = marked.parse(analContent); } catch(e) {}
        }
        window.onload = renderAll;

        const viewBlock = document.getElementById('view-analysis');
        const editBlock = document.getElementById('edit-analysis');
        const statusMsg = document.getElementById('sync-status');

        viewBlock.addEventListener('dblclick', triggerEdit);
        viewBlock.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEdit(); });

        function triggerEdit() {
            viewBlock.style.display = 'none'; editBlock.style.display = 'block';
            editBlock.value = document.getElementById('raw-analysis').value; editBlock.focus();
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function reconstructSelfHTML(newAnal) {
            const orig = document.getElementById('raw-original').value;
            const safeOrig = escapeHTML(orig); const safeAnal = escapeHTML(newAnal);
            return `<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n` + document.head.innerHTML + `\n</head>\n<body>\n` +
            `    <div class="container">\n` + document.querySelector('.container').innerHTML.replace(/<textarea id="raw-analysis".*?<\/textarea>/, `<textarea id="raw-analysis" style="display:none;">${safeAnal}</textarea>`) + `\n` +
            `    </div>\n    <script>\n` + renderAll.toString() + `\nwindow.onload = renderAll;\nconst viewBlock = document.getElementById('view-analysis');\nconst editBlock = document.getElementById('edit-analysis');\nconst statusMsg = document.getElementById('sync-status');\nviewBlock.addEventListener('dblclick', triggerEdit);\nviewBlock.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEdit(); });\n` + triggerEdit.toString() + `\n` + escapeHTML.toString() + `\n` + reconstructSelfHTML.toString() + `\nconst GH_OWNER = "${GH_OWNER}"; const GH_REPO = "${GH_REPO}";\neditBlock.onblur = ` + editBlock.onblur.toString() + `;\neditBlock.addEventListener('blur', editBlock.onblur);\n    </scr` + `ipt>\n</body>\n</html>`;
        }

        editBlock.onblur = async function() {
            const newText = editBlock.value.trim(); const oldText = document.getElementById('raw-analysis').value.trim();
            editBlock.style.display = 'none'; viewBlock.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText; renderAll();
                const token = localStorage.getItem('GH_TOKEN'); if(!token) return;
                statusMsg.style.display = 'block'; statusMsg.style.color = '#2980b9'; statusMsg.innerText = '📡 静默同步中...';

                const pureHtml = reconstructSelfHTML(newText);
                const path = window.location.pathname; const fileRelPath = path.substring(path.indexOf('docs/'));
                try {
                    const utf8Encode = new TextEncoder().encode(pureHtml);
                    const base64Html = btoa(String.fromCodePoint(...utf8Encode));
                    const getRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, { headers: { 'Authorization': `token ${token}` } });
                    const fileData = await getRes.json();
                    const putRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, {
                        method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Auto-save web note update`, content: base64Html, sha: fileData.sha })
                    });
                    if(putRes.ok) { statusMsg.style.color = '#27ae60'; statusMsg.innerText = '✅ 云端已同步'; setTimeout(() => statusMsg.style.display = 'none', 3000); }
                } catch(e) {}
            }
        };
        editBlock.addEventListener('blur', editBlock.onblur);
    </script>
</body>
</html>
