第一名男孩被称为莫伊塞斯（Moises），视频画面显示，他被从扭曲的残骸中救出，双眼被遮住以保护免受阳光刺激，现场救援人员为此鼓掌。

数小时后，临时总统德尔西·罗德里格斯（Delcy Rodríguez）宣布另一名11岁男孩获救，并在X平台上发布视频：画面中他被担架抬着，从一大堆废墟上被运下。

---

# 📘 英语教学式讲解

## 1. Two 11-year-old boys have separately been rescued
- 两名11岁男孩分别被救出。  
- have been rescued：现在完成时被动语态（强调“已发生且与现在相关”）  
- separately：分别地（强调两个独立事件）  

---

## 2. from the rubble of collapsed buildings
- 从倒塌建筑的废墟中。  
- rubble：废墟、碎石瓦砾  
- collapsed buildings：倒塌的建筑  

---

## 3. within hours of each other
- 在彼此相隔数小时之内。  
- within hours：在数小时内  
- of each other：彼此之间（强调时间接近）  

---

## 4. after powerful earthquakes struck Venezuela
- 在强烈地震袭击委内瑞拉之后。  
- after：时间顺序连接  
- powerful earthquakes：强烈地震  
- struck：袭击（strike 的过去式，常用于灾害语境）  

---

## 5. Video footage of the first boy, named as Moises
- 第一名男孩（名叫Moises）的影像资料。  
- video footage：视频画面  
- named as：被称为 / 名字是  

---

## 6. showed him being pulled from the twisted debris
- 显示他被从扭曲的残骸中拉出。  
- being pulled：被动进行时（正在被救援）  
- twisted debris：扭曲的废墟 / 残骸  

---

## 7. his eyes covered to protect them from the sun
- 他的眼睛被遮住，以防阳光刺激。  
- eyes covered：眼睛被遮挡（被动结构）  
- to protect them from the sun：目的状语（保护性措施）  

---

## 8. to the applause of rescuers
- 在救援人员的掌声中。  
- applause：掌声  
- rescuers：救援人员  
- to the applause of...：伴随结果结构（情绪强化）  

---

## 9. interim President Delcy Rodríguez announced another 11-year-old boy had been rescued
- 临时总统德尔西·罗德里格斯宣布另一名11岁男孩获救。  
- interim President：临时总统  
- announced that...：宣布（that可省略）  
- had been rescued：过去完成时被动（强调“在宣布之前已发生”）  

---

## 10. posted a video of him on X
- 在X平台上发布了他的视频。  
- posted：发布  
- on X：在社交平台X（原Twitter）  

---

## 11. being carried down a huge mound of wreckage on a stretcher
- 他被担架抬着，从一大堆废墟上被运下。  
- being carried：被动进行时  
- mound of wreckage：一大堆废墟  
- stretcher：担架  

---

# 📌 Key Expressions

- be rescued from the rubble —— 从废墟中获救  
- collapsed buildings —— 倒塌建筑  
- within hours of each other —— 相隔数小时  
- video footage —— 视频画面  
- twisted debris —— 扭曲的残骸  
- to the applause of —— 在……的掌声中  
- be named as —— 被称为 / 名叫  
- be carried on a stretcher —— 被担架抬着</textarea>
