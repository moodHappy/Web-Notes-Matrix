        <textarea id="raw-analysis" style="display:none;"># 📘 英语教学式讲解（逐句拆解）

## 1. A Venezuelan mother has died while saving her daughter
- **has died**：现在完成时  
  - 强调“刚发生并产生影响的死亡事件”  
- **while saving her daughter**
  - while + doing：在……过程中  
  - saving her daughter：救她女儿的动作  
- 语义重点：
  - “死亡”与“拯救行为”同时发生  
  - 构成典型的“牺牲型叙事结构”

📌 核心结构：
- A has died while doing B  
→ 在做B的过程中死亡

---

## 2. during the earthquakes that hit the country
- **during**：在……期间  
- **the earthquakes that hit the country**
  - that hit the country：定语从句修饰 earthquakes  
  - hit：这里表示“袭击 / 发生冲击”  

📌 语义重点：
- 灾难作为背景框架  
- 不是单一事件，而是“连续地震”

---

## 3. according to footballer Héctor Bello and local media
- **according to…**：根据……报道  
- **footballer Héctor Bello**
  - 职业身份 + 人名（信息来源之一）  
- **local media**：当地媒体（第二信息来源）  

📌 语义重点：
- 双重信息来源结构（增强可信度）
- “个人证词 + 媒体报道”并列

---

# 📚 整句表达效果（课堂总结）

- 句子属于标准新闻报道结构：
  - 主事件（死亡）  
  - 行为背景（救女儿）  
  - 时间/环境（地震）  
  - 信息来源（Héctor Bello + local media）  

- 叙事核心：
  - 个体悲剧 + 灾难背景 + 英雄式牺牲  

- 语言风格特点：
  - 简洁、客观  
  - 高信息密度  
  - 强事实导向（典型新闻英语）

---

# 📌 Key Expressions（板书 / Anki）

- has died while doing something —— 在做某事时去世  
- during the earthquakes —— 在地震期间  
- that hit the country —— 袭击该国的（地震）  
- according to —— 根据  
- local media —— 当地媒体

        <div class="card" id="block-analysis">
            <div class="card-header">🔬 深度笔记 (Analysis)</div>

    <script>
        const GH_OWNER = "moodHappy"; const GH_REPO = "Web-Notes-Matrix";
        function renderAll() {
            document.getElementById('view-original').textContent = document.getElementById('raw-original').value;
            const analContent = document.getElementById('raw-analysis').value;
            try { if (typeof marked !== 'undefined') document.getElementById('view-analysis').innerHTML = marked.parse(analContent); } catch(e) {}
        }
        window.onload = renderAll;

        const viewBlock = document.getElementById('view-analysis');
        const editBlock = document.getElementById('edit-analysis');
        const statusMsg = document.getElementById('sync-status');

        viewBlock.addEventListener('dblclick', triggerEdit);
        viewBlock.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEdit(); });

        function triggerEdit() {
            viewBlock.style.display = 'none'; editBlock.style.display = 'block';
            editBlock.value = document.getElementById('raw-analysis').value; editBlock.focus();
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function reconstructSelfHTML(newAnal) {
            const orig = document.getElementById('raw-original').value;
            const safeOrig = escapeHTML(orig); const safeAnal = escapeHTML(newAnal);
            return `<!DOCTYPE html>\n<html lang="zh-CN">\n<head>\n` + document.head.innerHTML + `\n</head>\n<body>\n` +
            `    <div class="container">\n` + document.querySelector('.container').innerHTML.replace(/<textarea id="raw-analysis".*?<\/textarea>/, `<textarea id="raw-analysis" style="display:none;">${safeAnal}</textarea>`) + `\n` +
            `    </div>\n    <script>\n` + renderAll.toString() + `\nwindow.onload = renderAll;\nconst viewBlock = document.getElementById('view-analysis');\nconst editBlock = document.getElementById('edit-analysis');\nconst statusMsg = document.getElementById('sync-status');\nviewBlock.addEventListener('dblclick', triggerEdit);\nviewBlock.addEventListener('touchstart', e => { if (e.touches.length === 2) triggerEdit(); });\n` + triggerEdit.toString() + `\n` + escapeHTML.toString() + `\n` + reconstructSelfHTML.toString() + `\nconst GH_OWNER = "${GH_OWNER}"; const GH_REPO = "${GH_REPO}";\neditBlock.onblur = ` + editBlock.onblur.toString() + `;\neditBlock.addEventListener('blur', editBlock.onblur);\n    </scr` + `ipt>\n</body>\n</html>`;
        }

        editBlock.onblur = async function() {
            const newText = editBlock.value.trim(); const oldText = document.getElementById('raw-analysis').value.trim();
            editBlock.style.display = 'none'; viewBlock.style.display = 'block';
            if (newText && newText !== oldText) {
                document.getElementById('raw-analysis').value = newText; renderAll();
                const token = localStorage.getItem('GH_TOKEN'); if(!token) return;
                statusMsg.style.display = 'block'; statusMsg.style.color = '#2980b9'; statusMsg.innerText = '📡 静默同步中...';

                const pureHtml = reconstructSelfHTML(newText);
                const path = window.location.pathname; const fileRelPath = path.substring(path.indexOf('docs/'));
                try {
                    const utf8Encode = new TextEncoder().encode(pureHtml);
                    const base64Html = btoa(String.fromCodePoint(...utf8Encode));
                    const getRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, { headers: { 'Authorization': `token ${token}` } });
                    const fileData = await getRes.json();
                    const putRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${fileRelPath}`, {
                        method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: `Auto-save web note update`, content: base64Html, sha: fileData.sha })
                    });
                    if(putRes.ok) { statusMsg.style.color = '#27ae60'; statusMsg.innerText = '✅ 云端已同步'; setTimeout(() => statusMsg.style.display = 'none', 3000); }
                } catch(e) {}
            }
        };
        editBlock.addEventListener('blur', editBlock.onblur);
    </script>
