但在那个时候，何塞·阿尔卡蒂奥·布恩迪亚并不相信吉普赛人的诚实，于是他用一头骡子和一对山羊，换取了那两块被磁化的金属锭。

他的妻子乌尔苏拉·伊瓜兰依赖这些牲畜来改善他们贫困的家境，但却无法说服他改变主意。

“很快我们就会有足够多的黄金，甚至多到可以铺满整间房子的地板，”他的丈夫回答道。

在接下来的几个月里，他努力工作，试图证明自己想法的真实性。

他走遍了这个地区的每一寸土地，甚至连河床也不放过，一边拖着那两块铁锭，一边大声诵读梅尔基亚德斯的咒语。

---

# 📘 英语教学式讲解

## 1. But José Arcadio Buendía at that time did not believe in the honesty of gypsies
- 但在那个时候，何塞·阿尔卡蒂奥·布恩迪亚并不相信吉普赛人的诚实。
- at that time：在那个时候（时间背景）
- did not believe in：不相信（固定结构）
- the honesty of gypsies：吉普赛人的诚实（抽象名词结构）

---

## 2. so he traded his mule and a pair of goats
- 所以他用他的骡子和一对山羊做了交换。
- traded：交换、交易（过去式）
- mule：骡子
- a pair of goats：一对山羊（pair 表示成对）

---

## 3. for the two magnetized ingots
- 换取了那两块被磁化的金属锭。
- magnetized：被磁化的
- ingots：金属锭

---

## 4. Úrsula Iguarán, his wife
- 乌尔苏拉·伊瓜兰，他的妻子。
- his wife：同位语解释身份

---

## 5. who relied on those animals
- 她依赖这些牲畜。
- relied on：依赖、依靠
- those animals：指前面的骡子和山羊

---

## 6. to increase their poor domestic holdings
- 来增加他们贫困的家庭财产。
- increase：增加
- domestic holdings：家庭资产、家产
- poor：贫困的（修饰整体状态）

---

## 7. was unable to dissuade him
- 无法劝阻他。
- dissuade：劝阻、说服某人不要做某事
- be unable to：无法……

---

## 8. &quot;Very soon we&#039;ll have gold enough and more to pave the floors of the house&quot;
- “很快我们就会有足够的黄金，多到可以铺满房子的地板。”
- we&#039;ll = we will
- gold enough and more：足够甚至更多的黄金（夸张表达）
- pave the floors：铺地板（用黄金铺地）

---

## 9. For several months he worked hard to demonstrate the truth of his idea
- 几个月来他努力工作，以证明自己想法的正确性。
- worked hard：努力工作
- demonstrate the truth：证明真实性
- idea：想法、理论

---

## 10. He explored every inch of the region
- 他探索了这个地区的每一寸土地。
- every inch：每一寸（强调彻底性）
- region：地区

---

## 11. even the riverbed
- 甚至包括河床。
- riverbed：河床

---

## 12. dragging the two iron ingots along
- 拖着那两块铁锭前进。
- dragging along：拖着走（持续动作）

---

## 13. and reciting Melquíades&#039; incantation aloud
- 并大声诵读梅尔基亚德斯的咒语。
- reciting：背诵、诵读
- incantation：咒语（带神秘/魔法色彩）
- aloud：大声地

---

# 📌 Key Expressions

- believe in the honesty of sb —— 相信某人的诚实
- trade A for B —— 用A交换B
- rely on —— 依赖
- dissuade someone —— 劝阻某人
- have gold enough and more —— 拥有多到足够甚至溢出的黄金
- pave the floor —— 用……铺地
- every inch of —— 每一寸
- drag along —— 拖着走
- recite aloud —— 大声诵读
- incantation —— 咒语
