# 📘 英语教学式讲解

## 1. Keep the skits
- 继续做这些短剧。
- keep + 名词：保持、继续维持某种行为。
- skits：短剧、小品、搞笑短视频。
- 这里语境中等于：
  - “继续产出这个系列”

---

## 2. bruh
- 兄弟 / 哥们 / 老兄（网络俚语）。
- bruh = bro 的变体，更随意、更吐槽感。
- 常见语气：
  - 亲密
  - 调侃
  - 无奈式支持

---

## 3. we love them
- 我们很喜欢它们。
- we love：我们喜欢。
- them：指 skits（复数短剧）。

---

# 📌 Language Note

这是一条典型的网络评论支持句，语气结构是：

&gt; 请求 + 情绪强化 + 轻松口语收尾

可以还原成更标准英语：

&gt; **Keep making the skits, bro. We love them.**

但原句更自然、更像真实社交媒体评论。
